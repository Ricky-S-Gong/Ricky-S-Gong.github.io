<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script src="./locale.js?v=20260406-home-tabs-133"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["\\(", "\\)"],
            ["$", "$"],

          displayMath: [

            ["$$", "$$"],

      };

    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

            <div class="detail-resource-row" id="detail-resource-row"></div>

          <p class="project-detail-summary" id="detail-summary"></p>

          <div class="detail-meta-row" id="detail-meta-row"></div>
        </section>

        <article class="project-detail-article glass section-offset" id="detail-article"></article>
      </main>
    </div>

    <script src="./projects-data.js?v=20260406-home-tabs-133"></script>
